name: Run ty

on:
  pull_request:
    paths:
    - '.github/workflows/*.yaml'
    - 'pyproject.toml'
    - 'uv.lock'
    - 'locations/**/*.py'
    - '!locations/spiders/**'
    - '!locations/exporters/osm.py' # Causes resource exhaustion if ty trys to parse


jobs:
  tycheck:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Run ty
      run: |
        uv run ty check ./locations/ --exclude 'locations/spiders/' --exclude 'locations/spiders/exporters/osm.py'
