name: Vendor NSI

on:
  schedule:
    - cron: "47 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Fetch data
        id: fetch-data
        run: |
          output=$(uv run scrapy vendor_nsi -t --nolog | tee output.log)
          echo "$output"
          echo "output<<EOF" >> $GITHUB_ENV
          echo "$output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "[Core] Update NSI"
          title: "[Core] Update NSI"
          branch: action/fetch-data
          body: ${{ env.output }}
